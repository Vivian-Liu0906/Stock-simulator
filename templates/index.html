<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stock Simulator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>📈 Stock Simulator</h1>

    <div class="portfolio-bar" id="portfolioBar">
        <span>💰 余额: <strong id="balance">$10,000.00</strong></span>
    </div>

    <div class="search-bar">
        <input type="text" id="symbolInput" placeholder="输入股票代码 (e.g. AAPL)" />
        <button onclick="searchStock()">搜索</button>
    </div>

    <div class="quick-picks">
    <span>热门股票：</span>
    <button onclick="quickSearch('AAPL')">🍎 苹果</button>
    <button onclick="quickSearch('TSLA')">⚡ 特斯拉</button>
    <button onclick="quickSearch('GOOGL')">🔍 谷歌</button>
    <button onclick="quickSearch('MSFT')">🪟 微软</button>
    <button onclick="quickSearch('NVDA')">🎮 英伟达</button>
    <button onclick="quickSearch('AMZN')">📦 亚马逊</button>
</div>

    <div class="stock-card" id="stockCard">
        <div class="stock-name" id="stockName"></div>
        <div class="stock-price" id="stockPrice"></div>
        <div class="stock-change" id="stockChange"></div>
        <div class="stock-details">
            <span>今日最高: <strong id="stockHigh"></strong></span>
            <span>今日最低: <strong id="stockLow"></strong></span>
        </div>
        <canvas id="priceChart" style="margin-top: 24px;"></canvas>

        <div class="trade-bar">
            <input type="number" id="sharesInput" placeholder="股数" min="1" value="1" />
            <button class="buy-btn" onclick="tradeStock('buy')">买入</button>
            <button class="sell-btn" onclick="tradeStock('sell')">卖出</button>
        </div>
        <div id="tradeMessage"></div>
    </div>

    <div class="holdings-card" id="holdingsCard">
        <h2>📊 我的持仓</h2>
        <div id="holdingsList"></div>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
